name: consistency

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: consistency-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run consistency checks
        run: python3 scripts/check_consistency.py
